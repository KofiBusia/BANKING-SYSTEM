name: 🔑 Generate Keystore (Run Once)

on:
  workflow_dispatch:
    inputs:
      key_alias:
        description: 'Key alias (e.g. crestline-key)'
        required: true
        default: 'crestline-key'
      store_password:
        description: 'Keystore password (save this somewhere safe!)'
        required: true
      key_password:
        description: 'Key password (can be same as above)'
        required: true
      full_name:
        description: 'Your full name'
        required: true
        default: 'Crestline Solutions LTD'
      organization:
        description: 'Organization name'
        required: true
        default: 'Crestline Solutions LTD'
      country_code:
        description: 'Two-letter country code'
        required: true
        default: 'GH'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.keystore \
            -alias "${{ github.event.inputs.key_alias }}" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.full_name }}, O=${{ github.event.inputs.organization }}, C=${{ github.event.inputs.country_code }}"

      - name: Print keystore as Base64
        run: |
          echo ""
          echo "============================================================"
          echo "COPY THE TEXT BELOW AND SAVE AS GITHUB SECRET: KEYSTORE_BASE64"
          echo "============================================================"
          base64 -w 0 release.keystore
          echo ""
          echo "============================================================"
          echo ""
          echo "Also save these as GitHub Secrets:"
          echo "  KEYSTORE_KEY_ALIAS  = ${{ github.event.inputs.key_alias }}"
          echo "  KEYSTORE_STORE_PASSWORD = (the store password you entered)"
          echo "  KEYSTORE_KEY_PASSWORD   = (the key password you entered)"
          echo ""
          echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
          echo "============================================================"
