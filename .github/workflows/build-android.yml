name: 🤖 Build Android AAB

on:
  push:
    branches: [main]
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile app dependencies
        working-directory: mobile-app
        run: npm install

      - name: Create .env file
        working-directory: mobile-app
        run: |
          echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env
          echo "VITE_WEBAPP_URL=${{ secrets.VITE_WEBAPP_URL }}" >> .env

      - name: Build web assets
        working-directory: mobile-app
        run: npm run build

      - name: Add Android platform
        working-directory: mobile-app
        run: npx cap add android

      - name: Sync Capacitor to Android
        working-directory: mobile-app
        run: npx cap sync android

      - name: Enable ProGuard / shrink resources for release
        working-directory: mobile-app/android
        run: |
          sed -i 's/minifyEnabled false/minifyEnabled true/' app/build.gradle
          sed -i '/minifyEnabled true/a\            shrinkResources true' app/build.gradle
          sed -i 's/proguard-android\.txt/proguard-android-optimize.txt/' app/build.gradle

      - name: Copy custom ProGuard rules
        working-directory: mobile-app
        run: cp android-config/proguard-rules.pro android/app/proguard-rules.pro

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.keystore

      - name: Make gradlew executable
        working-directory: mobile-app/android
        run: chmod +x gradlew

      - name: Build signed release AAB
        working-directory: mobile-app/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$RUNNER_TEMP/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_KEY_PASSWORD }}"

      - name: Get version name
        id: version
        run: echo "VERSION=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: crestline-bank-${{ steps.version.outputs.VERSION }}
          path: mobile-app/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Build summary
        run: |
          AAB_SIZE=$(du -sh mobile-app/android/app/build/outputs/bundle/release/app-release.aab | cut -f1)
          echo "### ✅ Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **File** | app-release.aab |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | $AAB_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | ${{ steps.version.outputs.VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download the AAB from the **Artifacts** section above and upload to Google Play." >> $GITHUB_STEP_SUMMARY
